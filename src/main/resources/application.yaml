server:
  port: 10001

app:
  batch-size: 2000
  climate:
    file: classpath:datasource/climate.csv
  population:
    file: classpath:datasource/population.csv
  oscars:
    file: classpath:datasource/oscars.csv

spring:
  application:
    name: spring-ai-rag-example
  banner:
    location: banner.txt
  data:
    redis:
      database: 0
      host: localhost
      port: 6379
      timeout: 2000
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5
          temperature: 1
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      redis:
        index: ai_documents
        initialize-schema: true
